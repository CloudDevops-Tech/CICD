pipeline {
    agent any

    stages {

        stage('Clone Repo') {
            steps {
                git branch: 'main', url: 'https://github.com/CloudDevops-Tech/CICD.git'
            }
        }

        stage('Deploy to Ubuntu EC2') {
            steps {
                sh '''
ssh -o StrictHostKeyChecking=no -i /var/lib/jenkins/pythonkey.pem ubuntu@13.201.64.222 << EOF

# Install Python & pip if not installed
sudo apt update -y
sudo apt install -y python3 python3-pip

# Go to app folder or clone repo
cd /home/ubuntu/app || git clone https://github.com/CloudDevops-Tech/CICD.git /home/ubuntu/app

cd /home/ubuntu/app

# Pull latest code
git pull origin main

# Install dependencies
pip3 install -r requirements.txt

# Stop old app
pkill -f app.py || true

# Run Flask app in background
nohup python3 app.py > output.log 2>&1 &

EOF
'''
            }
        }
    }
}